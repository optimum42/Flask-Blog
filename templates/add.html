<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add a new Blogpost</title>
</head>
<body>

    <h1>Create a new Blogpost</h1>

    <form method="POST" action="/add">

        <div>
            <label for="author">Author</label><br>
            <input
                type="text"
                id="author"
                name="author"
                required
            >
        </div>

        <br>

        <div>
            <label for="title">Title</label><br>
            <input
                type="text"
                id="title"
                name="title"
                required
            >
        </div>

        <br>

        <div>
            <label for="content">Content</label><br>
            <textarea
                id="content"
                name="content"
                rows="8"
                cols="50"
                required
            ></textarea>
        </div>

        <br>

        <button type="submit">
            Create Blogpost
        </button>

    </form>

</body>
</html>
