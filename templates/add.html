{% extends 'base.html' %}
{% block content %}

    <h1>Create a new Blogpost</h1>
    <form class="form" method="POST" action="{{ url_for('add') }}">
        <div class="form-group">
            <label for="author">Author</label><br>
            <input
                type="text"
                id="author"
                name="author"
                required
            >
        </div>
        <div class="form-group">
            <label for="title">Title</label><br>
            <input
                type="text"
                id="title"
                name="title"
                required
            >
        </div>
        <div class="form-group">
            <label for="content">Content</label><br>
            <textarea
                id="content"
                name="content"
                rows="10"
                cols="100"
                required
            ></textarea>
        </div>
        <button type="submit">
            Create Blogpost
        </button>
    </form>

{% endblock %}
