{% extends 'base.html' %}
{% block content %}

    <h1>Welcome to My Flask Blog!</h1>
    {% for post in blog_posts %}
        <div class="post">
            <h2>{{ post.title }}</h2>
            <p><em>Written by: {{ post.author }}</em></p>
            <p>{{ post.content }}</p>
            <div class="button-container">
                <a href="{{ url_for('like', post_id=post.id) }}">
                    <button class="like-button" type="button">
                        Like ({{ post.likes }})
                    </button>
                </a>
                <a href="{{ url_for('update', post_id=post.id) }}">
                    <button class="update-button" type="button">
                        Update
                    </button>
                </a>
                <a href="{{ url_for('delete', post_id=post.id) }}">
                    <button class="delete-button" type="button">
                        Delete
                    </button>
                </a>


            </div>
        </div>
    {% endfor %}

{% endblock %}
