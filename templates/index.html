{% extends 'base.html' %}
{% block content %}

    <h1>Welcome to My Flask Blog!</h1>
    {% for post in blog_posts %}
        <div class="post">
            <h2>{{ post.title }}</h2>
            <p><em>Written by: {{ post.author }}</em></p>
            <p>{{ post.content }}</p>
            <div class="button-container">
                <a href="/update/{{ post.id }}">
                    <button class="update-button" type="button">
                        Update
                    </button>
                </a>
                <a href="/delete/{{ post.id }}">
                    <button class="delete-button" type="button">
                        Delete
                    </button>
                </a>
            </div>
        </div>
    {% endfor %}

{% endblock %}
